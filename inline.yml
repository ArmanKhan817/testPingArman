- hosts: all
  gather_facts: yes
  tasks:
    - name: Run inline version report
      ansible.windows.win_powershell:
        script: |
          $hostname = $env:COMPUTERNAME
          $os = (Get-CimInstance Win32_OperatingSystem).Caption
          [PSCustomObject]@{ Hostname = $hostname; OS = $os }
      register: host_result

    - name: Save result as host fact
      set_fact:
        host_report: "{{ host_result.output }}"

- hosts: all
  gather_facts: no
  tasks:
    - name: Aggregate host reports
      set_fact:
        report_list: >-
          {{
            groups['all'] 
            | map('extract', hostvars, 'host_report') 
            | select('defined') 
            | list
          }}

    - name: Generate report
      template:
        src: report.j2
        dest: C:\ARFILES\windows_report.txt
      vars:
        all_hosts_data: "{{ report_list }}"
