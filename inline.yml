- hosts: all
  gather_facts: yes
  tasks:
    - name: Run inline version report
      ansible.windows.win_powershell:
        script: |
          $hostname = $env:COMPUTERNAME
          $os = (Get-CimInstance Win32_OperatingSystem).Caption
          [PSCustomObject]@{ Hostname = $hostname; OS = $os }
      register: host_result

    - name: Add result to aggregate list
      set_fact:
        report_list: "{{ report_list | default([]) + host_result.output }}"

- hosts: localhost
  gather_facts: no
  tasks:
    - name: Generate report
      template:
        src: report.j2
        dest: C:\ARFILES\windows_report.txt
      vars:
        all_hosts_data: "{{ report_list }}"
